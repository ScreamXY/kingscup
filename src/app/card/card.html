<div
  class="card"
  role="button"
  tabindex="0"
  [attr.data-testid]="'card-' + card()"
  [style.zoom]="zoom()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-pressed]="!showingFace()"
  (click)="flip()"
  (keydown.enter)="flip()"
  (keydown.space)="flip()"
>
  <div class="card__inner" [class.card__inner--flipped]="!showingFace()">
    <div [class]="faceClasses()"></div>
    <div class="card__back">
      <h2 class="card__title">{{ rule().title }}</h2>
      <p class="card__text">{{ rule().text }}</p>
    </div>
  </div>
</div>
