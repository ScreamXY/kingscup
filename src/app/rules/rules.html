<section class="rules">
  <div class="rules__intro">
    <span class="kc-eyebrow">The house rules</span>
    <h2>Every card, every command</h2>
    <p class="rules__lede">Tap any card to flip between its face and the rule it proclaims.</p>
  </div>

  <div class="rules__grid">
    @for (rank of ranks; track rank; let i = $index) {
      <div class="rules__row" animate.enter="fade-in" [style.animation-delay.ms]="i * 40">
        <app-card [card]="cardFor(rank)" [zoom]="0.6" [showFace]="true" />
        <app-card [card]="cardFor(rank)" [zoom]="0.6" [showFace]="false" />
      </div>
    }
  </div>
</section>
