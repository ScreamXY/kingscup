<section class="home">
  <div class="home__intro">
    <span class="kc-eyebrow">Ante up</span>
    <h2 class="home__title">Long live the game</h2>
    <p class="home__lede">
      Gather the court, fill the cup, and let the cards decide your fate. Bend the house rules to
      your table — or simply deal yourself in.
    </p>
    <div class="home__cta">
      <a mat-flat-button class="kc-cta" routerLink="/game">Deal me in</a>
      <a mat-stroked-button class="kc-cta" routerLink="/rules">How to play</a>
    </div>
  </div>

  <div class="home__fan" [style.--count]="kings.length">
    @for (king of kings; track king; let i = $index) {
      <app-card class="home__fan-card" [card]="king" [style.--i]="i" animate.enter="fade-in" />
    }
  </div>
</section>
