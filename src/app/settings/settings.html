<section class="settings">
  <div class="settings__intro">
    <span class="kc-eyebrow">House edits</span>
    <h2>Rewrite the rules</h2>
    <p class="settings__lede">
      Make the game your own — every card's decree is yours to reword. Changes save automatically.
    </p>
  </div>

  <div class="settings__actions kc-panel">
    <p class="settings__actions-text">Restore every rule to the rules it shipped with.</p>
    <button mat-stroked-button data-testid="reset-rules" (click)="reset()">
      Reset to defaults
    </button>
  </div>

  <div class="settings__rules">
    @for (row of rows(); track row.rank; let i = $index) {
      <div
        class="settings__rule kc-panel"
        animate.enter="fade-in"
        [style.animation-delay.ms]="i * 30"
      >
        <app-card [card]="row.card" />
        <div class="settings__fields">
          <mat-form-field appearance="outline">
            <mat-label>Title</mat-label>
            <input
              matInput
              #titleInput
              [attr.data-testid]="'rule-title-' + row.rank"
              [value]="row.rule.title"
              (input)="updateRule(row.rank, 'title', titleInput.value)"
            />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Rule</mat-label>
            <textarea
              matInput
              #textInput
              rows="4"
              [attr.data-testid]="'rule-text-' + row.rank"
              [value]="row.rule.text"
              (input)="updateRule(row.rank, 'text', textInput.value)"
            ></textarea>
          </mat-form-field>
        </div>
      </div>
    }
  </div>
</section>
