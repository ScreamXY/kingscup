<mat-sidenav-container class="shell">
  <mat-sidenav
    #drawer
    class="shell__sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <div class="shell__brand">
      <app-card card="spades_king" [zoom]="0.5" />
    </div>
    <mat-nav-list>
      @for (link of links; track link.path) {
        <a
          mat-list-item
          [routerLink]="link.path"
          routerLinkActive
          #rla="routerLinkActive"
          [activated]="rla.isActive"
          [attr.data-testid]="'nav-' + link.label.toLowerCase()"
          (click)="closeIfHandset(drawer)"
        >
          {{ link.label }}
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content">
    <mat-toolbar color="primary" class="shell__toolbar">
      @if (isHandset()) {
        <button mat-icon-button (click)="drawer.toggle()" aria-label="Toggle navigation menu">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <h1 class="shell__title" data-testid="page-title">{{ pageTitle() }}</h1>
    </mat-toolbar>

    <main class="shell__main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
