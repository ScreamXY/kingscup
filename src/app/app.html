<mat-sidenav-container class="shell">
  <mat-sidenav
    #drawer
    class="shell__sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <div class="shell__brand">
      <app-card card="spades_king" />
      <div class="shell__wordmark">
        <span class="shell__crown" aria-hidden="true">♔</span>
        <span class="shell__name">King's Cup</span>
        <span class="shell__tag">The Royal Card Game</span>
      </div>
    </div>
    <mat-nav-list>
      @for (link of links; track link.path) {
        <a
          mat-list-item
          [routerLink]="link.path"
          routerLinkActive
          #rla="routerLinkActive"
          [activated]="rla.isActive"
          [attr.data-testid]="link.testId"
          (click)="closeIfHandset(drawer)"
        >
          {{ link.label }}
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content">
    <mat-toolbar class="shell__toolbar">
      @if (isHandset()) {
        <button mat-icon-button (click)="drawer.toggle()" aria-label="Toggle navigation menu">
          <svg
            class="shell__menu-icon"
            viewBox="0 0 24 24"
            width="24"
            height="24"
            aria-hidden="true"
          >
            <path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z" />
          </svg>
        </button>
      }
      <h1 class="shell__title" data-testid="page-title">{{ pageTitle() }}</h1>
    </mat-toolbar>

    <main class="shell__main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
